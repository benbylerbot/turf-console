name: Turf Console Weekly Brief

on:
  schedule:
    - cron: '0 23 * * 0'   # Sunday ~6 PM Central (summer). cron is UTC.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Generate brief, email it, stage dashboard
        env:
          TURF_SMTP_PASS: ${{ secrets.TURF_SMTP_PASS }}
          TURF_SMTP_USER: ${{ secrets.TURF_SMTP_USER }}
          TURF_SMTP_TO:   ${{ secrets.TURF_SMTP_TO }}
        run: |
          python turf_brief.py --email
          mkdir -p _site
          cp turf-console.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
